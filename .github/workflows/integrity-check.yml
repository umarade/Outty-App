name: Outty-App CI

on:
  push:
    branches: [ "main" ] # Triggers every time you merge to master/main
  pull_request:
    branches: [ "main" ]

jobs:
  # Job 1: React Native Frontend (App)
  frontend-validation:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./App
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'App/package-lock.json'

      - name: Install Frontend Dependencies
        run: npm install

      - name: Verify Imports and Types
        # Uses tsconfig.json in ./App to check Screen and Component integrity
        run: npx tsc --noEmit --skipLibCheck

  # Job 2: Node.js Backend (App/server)
  backend-validation:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./App/server
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'App/server/package-lock.json'

      - name: Install Backend Dependencies
        run: npm install

      # Recreate the sensitive serviceAccountKey.json from GitHub Secrets
      - name: Inject Firebase Credentials
        run: |
          echo "${{ secrets.FIREBASE_SERVICE_ACCOUNT }}" | base64 --decode > serviceAccountKey.json

      - name: Run Backend Tests
        # Executes your tests to verify profileServices.js and profileRoutes.js
        run: npm test
