name: Import Integrity Check

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

jobs:
  verify-imports:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Run Import Check
        # tsc checks that all imported modules and files exist.
        # --noEmit tells it not to generate any .js files.
        # --skipLibCheck speeds up the process by not re-checking node_modules types.
        run: npx tsc --noEmit --skipLibCheck